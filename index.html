<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8">
<title>RN Fleet Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body,#map{
    height:100%;
    margin:0;
    padding:0;
}

#info{
    position:absolute;
    top:10px;
    left:60px;
    z-index:1000;
    background:white;
    padding:10px;
    border-radius:6px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
    font-family:Arial;
    min-width:260px;
}

.legend{
    background:white;
    padding:10px;
    border-radius:6px;
    line-height:20px;
}
</style>

</head>

<body>

<div id="info">
<b>RN Fleet Map</b><br>
Нажмите на автомобиль
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([55.75,37.61],5);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom:19,
        attribution:'© OpenStreetMap'
    }
).addTo(map);

const vehiclesLayer = L.layerGroup().addTo(map);
const stationsLayer = L.layerGroup().addTo(map);

let stationsData = null;

function distanceKm(lat1, lon1, lat2, lon2)
{
    const R = 6371;

    const dLat = (lat2-lat1) * Math.PI / 180;
    const dLon = (lon2-lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    return R * 2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );
}

function stationColor(dt)
{
    const price = parseFloat(
        String(dt).replace(',', '.')
    );

    if(isNaN(price))
        return 'gray';

    if(price < 75)
        return 'green';

    if(price <= 80)
        return 'orange';

    return 'red';
}

function showStationsForVehicle(vehicle)
{
    stationsLayer.clearLayers();

    const nearbyRoads = new Set();

    stationsData.features.forEach(f => {

        const p = f.properties;

        const stationLat = f.geometry.coordinates[1];
        const stationLon = f.geometry.coordinates[0];

        const dist = distanceKm(
            vehicle.lat,
            vehicle.lon,
            stationLat,
            stationLon
        );

        if(dist <= 50)
        {
            nearbyRoads.add(String(p.roadCode));
        }
    });

    let count = 0;

    stationsData.features.forEach(f => {

        const p = f.properties;

        if(!nearbyRoads.has(String(p.roadCode)))
            return;

        const stationLat = f.geometry.coordinates[1];
        const stationLon = f.geometry.coordinates[0];

        const dist = distanceKm(
            vehicle.lat,
            vehicle.lon,
            stationLat,
            stationLon
        );

        if(dist > 200)
            return;

        count++;

        const marker = L.circleMarker(
            [stationLat, stationLon],
            {
                radius:6,
                color:stationColor(p.dt)
            }
        );

        marker.bindPopup(
            '<b>' + (p.azs || '') + '</b><br>' +
            'ДТ: ' + (p.dt || '') + '<br>' +
            'Трасса: ' + (p.road || '') + '<br>' +
            'Км: ' + (p.roadKm || '') + '<br>' +
            'Расстояние: ' + dist.toFixed(1) + ' км<br>' +
            (p.addr || '')
        );

        stationsLayer.addLayer(marker);

    });

    document.getElementById('info').innerHTML =
        '<b>RN Fleet Map</b><br>' +
        'Машина: ' + vehicle.name + '<br>' +
        'Трассы рядом: ' + Array.from(nearbyRoads).join(', ') + '<br>' +
        'АЗС найдено: ' + count;
}

Promise.all([
    fetch('vehicles.geojson?v=' + Date.now()).then(r => r.json()),
    fetch('stations.geojson?v=' + Date.now()).then(r => r.json())
])
.then(([vehicles, stations]) => {

    stationsData = stations;

    const bounds = [];

    vehicles.features.forEach(f => {

        const p = f.properties;

        const lat = f.geometry.coordinates[1];
        const lon = f.geometry.coordinates[0];

        bounds.push([lat, lon]);

        const marker = L.marker([lat, lon]);

        marker.bindPopup(
            '<b>' + (p.vehicle || '') + '</b><br>' +
            'Топливо: ' + (p.fuel || '') + '<br>' +
            'Скорость: ' + (p.speed || '') + ' км/ч<br>' +
            'Трасса: ' + (p.roadCode || '') + '<br>' +
            'Км: ' + (p.roadKm || '')
        );

        marker.on('click', function(){

            showStationsForVehicle({
                name     : p.vehicle,
                roadCode : p.roadCode,
                lat      : lat,
                lon      : lon
            });

        });

        vehiclesLayer.addLayer(marker);

    });

    if(bounds.length > 0)
    {
        map.fitBounds(bounds);
    }

});

const legend = L.control({
    position:'bottomright'
});

legend.onAdd = function()
{
    const div = L.DomUtil.create('div','legend');

    div.innerHTML =
        '<b>Цена ДТ</b><br>' +
        '🟢 до 75<br>' +
        '🟠 75-80<br>' +
        '🔴 выше 80';

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
