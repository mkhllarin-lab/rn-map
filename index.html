<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RN Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body,#map{
    height:100%;
    margin:0;
}
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([55.75,37.61],5);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}
).addTo(map);

L.marker([55.75,37.61])
.addTo(map)
.bindPopup('Карта работает');

</script>

</body>
</html>
