<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8">
<title>RN Fleet Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body,#map{
    height:100%;
    margin:0;
    padding:0;
}

#info{
    position:absolute;
    top:10px;
    left:60px;
    z-index:1000;
    background:white;
    padding:10px;
    border-radius:6px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
    font-family:Arial;
}

.legend{
    background:white;
    padding:10px;
    border-radius:6px;
}
</style>

</head>

<body>

<div id="info">
<b>RN Fleet Map</b><br>
Нажмите на автомобиль
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([55.75,37.61],5);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap'
}
).addTo(map);

const vehicleLayer = L.layerGroup().addTo(map);
const stationLayer = L.layerGroup().addTo(map);

let stationsData = null;

function stationColor(dt)
{
    const price = parseFloat(
        String(dt).replace(',','.')
    );

    if(isNaN(price)) return 'gray';
    if(price < 75) return 'green';
    if(price <= 80) return 'orange';

    return 'red';
}

function showStationsForVehicle(roadCode, roadKm)
{
    stationLayer.clearLayers();

    let count = 0;

    stationsData.features.forEach(f => {

        const p = f.properties;

        if(p.roadCode !== roadCode)
            return;

        const km = Number(p.roadKm);

        if(Math.abs(km - roadKm) > 200)
            return;

        count++;

        const marker = L.circleMarker(
            [
                f.geometry.coordinates[1],
                f.geometry.coordinates[0]
            ],
            {
                radius:6,
                color:stationColor(p.dt)
            }
        );

        marker.bindPopup(
            '<b>' + p.azs + '</b><br>' +
            'ДТ: ' + p.dt + '<br>' +
            'Трасса: ' + p.road + '<br>' +
            'Км: ' + p.roadKm + '<br>' +
            p.addr
        );

        stationLayer.addLayer(marker);

    });

    document.getElementById('info').innerHTML =
        '<b>RN Fleet Map</b><br>' +
        'Трасса: ' + roadCode + '<br>' +
        'Км машины: ' + roadKm + '<br>' +
        'АЗС найдено: ' + count;
}

Promise.all([
    fetch('vehicles.geojson').then(r => r.json()),
    fetch('stations.geojson').then(r => r.json())
])
.then(([vehicles, stations]) => {

    stationsData = stations;

    const bounds = [];

    vehicles.features.forEach(f => {

        const p = f.properties;

        const lat = f.geometry.coordinates[1];
        const lon = f.geometry.coordinates[0];

        bounds.push([lat, lon]);

        const marker = L.marker([lat, lon]);

        marker.bindPopup(
            '<b>' + p.vehicle + '</b><br>' +
            'Топливо: ' + p.fuel + '<br>' +
            'Скорость: ' + p.speed + ' км/ч<br>' +
            'Трасса: ' + p.roadCode + '<br>' +
            'Км: ' + p.roadKm
        );

        marker.on('click', () => {
            showStationsForVehicle(
                p.roadCode,
                Number(p.roadKm)
            );
        });

        vehicleLayer.addLayer(marker);

    });

    if(bounds.length > 0)
    {
        map.fitBounds(bounds);
    }

});

const legend = L.control({
    position:'bottomright'
});

legend.onAdd = function()
{
    const div = L.DomUtil.create('div','legend');

    div.innerHTML =
        '<b>Цена ДТ</b><br>' +
        '🟢 < 75<br>' +
        '🟠 75-80<br>' +
        '🔴 > 80';

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
