<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>RN Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html,body,#map{
    height:100%;
    margin:0;
}

.legend{
    background:white;
    padding:10px;
    line-height:20px;
    border-radius:5px;
}

.searchBox{
    position:absolute;
    top:10px;
    left:60px;
    z-index:1000;
    background:white;
    padding:8px;
    border-radius:4px;
    box-shadow:0 0 5px rgba(0,0,0,.3);
}
</style>

</head>

<body>

<div class="searchBox">
    <input id="searchVehicle" placeholder="Номер машины">
    <button onclick="findVehicle()">Найти</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map').setView([55.75,37.61],5);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}
).addTo(map);

const stationLayer = L.markerClusterGroup();
const vehicleLayer = L.layerGroup();

const vehicleMarkers = [];
let vehiclesData = null;

let vehiclesData = null;

fetch('vehicles.geojson')
.then(r => r.json())
.then(vData => {

```
vehiclesData = vData;

vData.features.forEach(f => {

    const p = f.properties;

    const marker = L.marker([
        f.geometry.coordinates[1],
        f.geometry.coordinates[0]
    ]);

    marker.vehicleName = p.vehicle;

    marker.bindPopup(`
        <b>${p.vehicle}</b><br>
        Топливо: ${p.fuel}<br>
        Скорость: ${p.speed} км/ч<br>
        Курс: ${p.direction}°
    `);

    vehicleMarkers.push(marker);
    vehicleLayer.addLayer(marker);

});

map.addLayer(vehicleLayer);
loadStations();

```

});

function distanceKm(lat1, lon1, lat2, lon2)
{
const R = 6371;

```
const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

return R * (2 * Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a)
));
```

}

function loadStations()
{


```
    data.features.forEach(f => {

        const lat = f.geometry.coordinates[1];
        const lon = f.geometry.coordinates[0];

        let nearVehicle = false;

        for(const v of vehiclesData.features)
        {
            const vLat = v.geometry.coordinates[1];
            const vLon = v.geometry.coordinates[0];

            if(distanceKm(
                lat,
                lon,
                vLat,
                vLon
            ) < 300)
            {
                nearVehicle = true;
                break;
            }
        }

        if(!nearVehicle)
            return;

        const p = f.properties;

        let color = 'gray';

        const dt = parseFloat(
            String(p.dt).replace(',', '.')
        );

        if(!isNaN(dt))
        {
            if(dt < 75)
                color = 'green';
            else if(dt <= 80)
                color = 'orange';
            else
                color = 'red';
        }

        const marker = L.circleMarker(
            [lat, lon],
            {
                radius:5,
                color:color
            }
        );

        marker.bindPopup(`
            <b>${p.azs || ''}</b><br>
            ДТ: ${p.dt || ''}<br>
            ${p.road || ''}<br>
            км: ${p.km || ''}<br>
            ${p.addr || ''}
        `);

        stationLayer.addLayer(marker);

    });

    map.addLayer(stationLayer);
});
```

}

fetch('vehicles.geojson')

    vehiclesData = data;

    data.features.forEach(f => {

            Топливо: ${p.fuel}<br>

            Курс: ${p.direction}°
        `);

        vehicleMarkers.push(marker);

        vehicleLayer.addLayer(marker);

    });

    map.addLayer(vehicleLayer);

});

{
const R = 6371;

```

const dLon = (lon2-lon1) * Math.PI/180;

    Math.sin(dLon/2);

return R * (2 * Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a)

```

}

{

L.control.layers(
{
    "АЗС": stationLayer,
    "Машины": vehicleLayer
}
).addTo(map);

function findVehicle()
{
    const q =
        document
        .getElementById('searchVehicle')
        .value
        .toLowerCase();

    const marker =
        vehicleMarkers.find(
            x => x.vehicleName &&
            x.vehicleName.toLowerCase().includes(q)
        );

    if(marker)
    {
        map.setView(
            marker.getLatLng(),
            10
        );

        marker.openPopup();
    }
}

const legend = L.control({position:'bottomright'});

legend.onAdd = function()
{
    const div = L.DomUtil.create('div','legend');

    div.innerHTML =
        '<b>ДТ</b><br>' +
        '🟢 до 75<br>' +
        '🟠 75-80<br>' +
        '🔴 выше 80';

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
